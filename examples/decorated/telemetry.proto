syntax = "proto3";
package moon.proto.lab.demo.v1;

import "google/protobuf/timestamp.proto";
option java_package = "org.moonbit.proto.lab.demo";
option go_package = "example.com/moonproto/demo;demo";

enum Severity {
  option allow_alias = true;
  reserved 9 to 12;
  SEVERITY_UNSPECIFIED = 0;
  SEVERITY_INFO = 1;
  SEVERITY_WARN = 2;
  SEVERITY_ERROR = 3 [(deprecated) = false];
}

message Metadata {
  string source = 1;
  map<string, string> labels = 2;
}

message TelemetryEvent {
  option deprecated = false;
  reserved 7, 9 to 12;
  reserved "old_payload";

  uint64 id = 1 [json_name = "eventId"];
  Severity severity = 2;
  Metadata metadata = 3;
  repeated string tags = 4;
  optional string trace_id = 5;
  oneof payload {
    string text = 6;
    bytes raw = 8;
  }
}
