syntax = "proto3";
package moon.proto.lab.demo.v1;

message Envelope {
  enum Kind {
    KIND_UNSPECIFIED = 0;
    KIND_CREATED = 1;
    KIND_DELETED = 2;
  }

  message Payload {
    string body = 1;
    bytes raw = 2;
  }
}

message AuditTrail {
  Envelope.Payload latest = 1;
  .moon.proto.lab.demo.v1.Envelope.Kind kind = 2;
  repeated Envelope.Payload history = 3;
  map<string, Envelope.Payload> by_id = 4;
}
