name: CI

on:
  push:
  pull_request:

jobs:
  moonbit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Python oracle dependencies
        run: python3 -m pip install --user 'protobuf==3.20.3'
      - name: Python protobuf oracle fixtures
        run: python3 tests/oracle/python_protobuf_oracle.py
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Go protobuf oracle fixtures
        run: cd tests/oracle && go run .
      - name: Install MoonBit toolchain
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
      - name: Check
        run: moon check
      - name: Build
        run: moon build
      - name: Test
        run: moon test
      - name: Test all targets
        run: moon test --target all
